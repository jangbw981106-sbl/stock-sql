<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCK_WATCH</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #07070f;
  --surface: #0f0f1a;
  --surface2: #14141f;
  --border: #1c1c2e;
  --border2: #252540;
  --accent: #00e5ff;
  --text: #dde0f0;
  --muted: #4a4a70;
  --muted2: #6a6a90;
  --up: #00e676;
  --down: #ff4060;
  --flat: #7070a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 10% 10%, rgba(0,229,255,0.03) 0%, transparent 55%), radial-gradient(ellipse at 90% 90%, rgba(255,64,96,0.03) 0%, transparent 55%); pointer-events:none; z-index:0; }

.app { display:flex; min-height:100vh; }
.sidebar { width:260px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
.main { margin-left:260px; flex:1; padding:28px 32px; position:relative; z-index:1; max-width:calc(100vw - 260px); }

.sidebar-header { padding:20px 20px 14px; border-bottom:1px solid var(--border); }
.logo { font-family:'Space Mono',monospace; font-size:0.95rem; color:var(--accent); letter-spacing:3px; margin-bottom:4px; }
.clock { font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--muted2); }

.sidebar-search { padding:14px 14px 10px; }
.sidebar-search input { width:100%; background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:9px 12px; font-family:'Space Mono',monospace; font-size:0.75rem; outline:none; border-radius:4px; transition:border-color 0.2s; text-transform:uppercase; }
.sidebar-search input:focus { border-color:var(--accent); }
.sidebar-search input::placeholder { color:var(--muted); text-transform:none; }
.add-btn { width:100%; margin-top:7px; background:var(--accent); color:#000; border:none; padding:9px; font-family:'Space Mono',monospace; font-size:0.72rem; font-weight:700; cursor:pointer; border-radius:4px; letter-spacing:1px; transition:opacity 0.2s; }
.add-btn:hover { opacity:0.85; }

.sidebar-section-label { font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:3px; color:var(--muted); padding:10px 16px 6px; text-transform:uppercase; }
.preset-list { padding:0 10px 10px; display:flex; flex-wrap:wrap; gap:5px; }
.preset-btn { background:transparent; border:1px solid var(--border2); color:var(--muted2); padding:4px 10px; font-family:'Space Mono',monospace; font-size:0.65rem; cursor:pointer; border-radius:2px; transition:all 0.2s; }
.preset-btn:hover { border-color:var(--accent); color:var(--accent); }

.watchlist { flex:1; padding:6px 0; }
.watch-item { display:flex; align-items:center; justify-content:space-between; padding:9px 16px; cursor:pointer; border-left:2px solid transparent; transition:all 0.15s; }
.watch-item:hover { background:var(--surface2); }
.watch-item.active { background:var(--surface2); border-left-color:var(--accent); }
.watch-item.up { border-left-color:var(--up); }
.watch-item.down { border-left-color:var(--down); }
.wi-left .wi-ticker { font-family:'Space Mono',monospace; font-size:0.78rem; font-weight:700; }
.wi-left .wi-name { font-size:0.65rem; color:var(--muted2); margin-top:1px; }
.wi-right { text-align:right; }
.wi-price { font-family:'Space Mono',monospace; font-size:0.78rem; }
.wi-change { font-family:'Space Mono',monospace; font-size:0.65rem; margin-top:1px; }
.wi-change.up { color:var(--up); } .wi-change.down { color:var(--down); } .wi-change.flat { color:var(--flat); }
.wi-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.8rem; padding:2px 4px; margin-left:6px; border-radius:2px; transition:color 0.2s; flex-shrink:0; }
.wi-remove:hover { color:var(--down); }
.sidebar-footer { padding:10px 14px; border-top:1px solid var(--border); font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--muted); display:flex; justify-content:space-between; }

.main-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; }
.stock-title .big-ticker { font-family:'Space Mono',monospace; font-size:1.6rem; font-weight:700; color:var(--accent); letter-spacing:2px; }
.stock-title .big-name { font-size:0.85rem; color:var(--muted2); margin-top:2px; }
.big-price-area { text-align:right; }
.big-price { font-family:'Space Mono',monospace; font-size:2.2rem; font-weight:700; }
.big-change { font-family:'Space Mono',monospace; font-size:0.85rem; padding:3px 10px; border-radius:3px; display:inline-block; margin-top:4px; }
.big-change.up { background:rgba(0,230,118,0.15); color:var(--up); }
.big-change.down { background:rgba(255,64,96,0.15); color:var(--down); }
.big-change.flat { background:rgba(112,112,160,0.15); color:var(--flat); }

.stat-row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:24px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:12px 14px; }
.stat-label { font-size:0.65rem; color:var(--muted2); margin-bottom:4px; }
.stat-value { font-family:'Space Mono',monospace; font-size:0.85rem; font-weight:700; }

.tabs { display:flex; gap:2px; margin-bottom:24px; border-bottom:1px solid var(--border); }
.tab-btn { background:none; border:none; color:var(--muted2); padding:10px 20px; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.2s; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-panel { display:none; } .tab-panel.active { display:block; }

.chart-controls { display:flex; gap:6px; margin-bottom:12px; align-items:center; }
.range-btn { background:transparent; border:1px solid var(--border2); color:var(--muted2); padding:4px 12px; font-family:'Space Mono',monospace; font-size:0.68rem; cursor:pointer; border-radius:3px; transition:all 0.2s; }
.range-btn:hover,.range-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.06); }
.chart-type-btn { background:transparent; border:1px solid var(--border2); color:var(--muted2); padding:4px 12px; font-family:'Space Mono',monospace; font-size:0.68rem; cursor:pointer; border-radius:3px; transition:all 0.2s; }
.chart-type-btn.active { border-color:#ffd700; color:#ffd700; background:rgba(255,215,0,0.06); }
.chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:20px; position:relative; height:320px; }
.chart-wrap canvas { width:100% !important; height:100% !important; }
.chart-loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--surface); border-radius:8px; font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted2); }

.indicators-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.indicator-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:14px 16px; }
.ind-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.ind-name { font-size:0.7rem; color:var(--muted2); letter-spacing:1px; text-transform:uppercase; }
.ind-value { font-family:'Space Mono',monospace; font-size:1.1rem; font-weight:700; }
.ind-signal { font-size:0.62rem; padding:2px 8px; border-radius:10px; font-weight:700; }
.ind-signal.buy { background:rgba(0,230,118,0.15); color:var(--up); }
.ind-signal.sell { background:rgba(255,64,96,0.15); color:var(--down); }
.ind-signal.neutral { background:rgba(112,112,160,0.15); color:var(--flat); }
.ind-bar-wrap { height:4px; background:var(--border2); border-radius:2px; margin-top:8px; }
.ind-bar { height:100%; border-radius:2px; transition:width 0.5s ease; }

.ai-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:20px; }
.ai-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.ai-title { font-family:'Space Mono',monospace; font-size:0.8rem; color:var(--accent); letter-spacing:2px; }
.ai-analyze-btn { background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(0,229,255,0.05)); border:1px solid var(--accent); color:var(--accent); padding:7px 16px; font-family:'Space Mono',monospace; font-size:0.7rem; font-weight:700; cursor:pointer; border-radius:4px; letter-spacing:1px; transition:all 0.2s; }
.ai-analyze-btn:hover { background:rgba(0,229,255,0.2); }
.ai-analyze-btn:disabled { opacity:0.4; cursor:not-allowed; }
.ai-content { font-size:0.82rem; line-height:1.75; color:var(--text); white-space:pre-wrap; }
.ai-content.placeholder { color:var(--muted2); font-size:0.78rem; }
.ai-verdict { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.verdict-badge { font-family:'Space Mono',monospace; font-size:0.7rem; padding:4px 14px; border-radius:3px; font-weight:700; letter-spacing:1px; }
.verdict-badge.bullish { background:rgba(0,230,118,0.15); color:var(--up); border:1px solid rgba(0,230,118,0.3); }
.verdict-badge.bearish { background:rgba(255,64,96,0.15); color:var(--down); border:1px solid rgba(255,64,96,0.3); }
.verdict-badge.neutral { background:rgba(112,112,160,0.15); color:var(--flat); border:1px solid rgba(112,112,160,0.3); }

.news-list { display:flex; flex-direction:column; gap:10px; }
.news-item { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:14px 16px; transition:border-color 0.2s; }
.news-item:hover { border-color:var(--border2); }
.news-meta { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
.news-source { font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--accent); letter-spacing:1px; }
.news-time { font-size:0.62rem; color:var(--muted2); }
.news-sentiment { font-size:0.58rem; padding:1px 7px; border-radius:8px; font-weight:700; margin-left:auto; }
.news-sentiment.pos { background:rgba(0,230,118,0.15); color:var(--up); }
.news-sentiment.neg { background:rgba(255,64,96,0.15); color:var(--down); }
.news-sentiment.neu { background:rgba(112,112,160,0.15); color:var(--flat); }
.news-title { font-size:0.82rem; font-weight:600; line-height:1.5; }

.main-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:12px; color:var(--muted2); font-family:'Space Mono',monospace; font-size:0.8rem; text-align:center; }
.main-empty .em-icon { font-size:2.5rem; margin-bottom:8px; opacity:0.3; }
.spinner { display:inline-block; width:10px; height:10px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
.fade-in { animation:fadeIn 0.3s ease both; }
.status-toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--border2); padding:10px 16px; border-radius:6px; font-family:'Space Mono',monospace; font-size:0.72rem; color:var(--text); z-index:999; transition:opacity 0.3s; display:none; }
.status-toast.loading { border-color:var(--accent); color:var(--accent); }
.status-toast.error { border-color:var(--down); color:var(--down); }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar {
    width: 100%;
    height: auto;
    position: relative;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .main {
    margin-left: 0;
    max-width: 100%;
    padding: 16px;
  }
  .app { flex-direction: column; }

  /* 모바일 사이드바: 가로 스크롤 watchlist */
  .watchlist {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    padding: 6px 10px;
    gap: 8px;
    scrollbar-width: none;
  }
  .watchlist::-webkit-scrollbar { display: none; }
  .watch-item {
    flex-direction: column;
    align-items: flex-start;
    min-width: 100px;
    padding: 8px 10px;
    border-left: none;
    border-bottom: 2px solid transparent;
    border-radius: 6px;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .watch-item.up { border-bottom-color: var(--up); }
  .watch-item.down { border-bottom-color: var(--down); }
  .watch-item.active { border-bottom-color: var(--accent); }
  .wi-right { text-align: left; margin-top: 4px; }
  .wi-remove { position: absolute; top: 4px; right: 4px; }
  .watch-item { position: relative; }

  /* 사이드바 검색/프리셋 숨김 (모바일에선 하단 버튼으로 대체) */
  .sidebar-search { display: none; }
  .preset-list { display: none; }
  .sidebar-section-label { display: none; }
  .sidebar-footer { display: none; }

  /* 모바일 상단 헤더 */
  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
  }

  /* 모바일 추가 버튼 (플로팅) */
  .mobile-add-btn {
    display: flex !important;
  }

  /* 메인 헤더 */
  .main-header {
    flex-direction: column;
    gap: 10px;
  }
  .big-price-area { text-align: left; }
  .big-price { font-size: 1.6rem; }
  .stock-title .big-ticker { font-size: 1.2rem; }

  /* 스탯 그리드: 2열 */
  .stat-row {
    grid-template-columns: repeat(2, 1fr);
  }
  .stat-row .stat-box:last-child {
    grid-column: 1 / -1;
  }

  /* 탭 스크롤 */
  .tabs {
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn { white-space: nowrap; padding: 10px 14px; font-size: 0.76rem; }

  /* 차트 높이 축소 */
  .chart-wrap { height: 220px; }

  /* 기술적 지표: 2열 */
  .indicators-grid { grid-template-columns: repeat(2, 1fr); }

  /* 차트 컨트롤 스크롤 */
  .chart-controls { overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; }
  .chart-controls::-webkit-scrollbar { display: none; }
  .range-btn, .chart-type-btn { white-space: nowrap; flex-shrink: 0; }
}

@media (max-width: 400px) {
  .indicators-grid { grid-template-columns: 1fr; }
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .big-price { font-size: 1.3rem; }
}

/* 모바일 플로팅 추가 버튼 (기본 숨김) */
.mobile-add-btn {
  display: none;
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 200;
  background: var(--accent);
  color: #000;
  border: none;
  width: 52px; height: 52px;
  border-radius: 50%;
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,229,255,0.35);
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, opacity 0.2s;
}
.mobile-add-btn:hover { transform: scale(1.1); }

/* 모바일 검색 모달 */
.mobile-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  align-items: flex-end;
}
.mobile-modal.open { display: flex; }
.mobile-modal-inner {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  border-top: 1px solid var(--border);
}
.mobile-modal-title {
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem; color: var(--accent);
  letter-spacing: 2px; margin-bottom: 16px;
}
.mobile-modal input {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text); padding: 12px 16px;
  font-family: 'Space Mono', monospace; font-size: 0.85rem;
  outline: none; border-radius: 6px; margin-bottom: 12px;
  text-transform: uppercase;
}
.mobile-modal input:focus { border-color: var(--accent); }
.mobile-modal-actions { display: flex; gap: 10px; }
.mobile-modal-confirm {
  flex: 1; background: var(--accent); color: #000;
  border: none; padding: 12px; border-radius: 6px;
  font-family: 'Space Mono', monospace; font-size: 0.8rem;
  font-weight: 700; cursor: pointer;
}
.mobile-modal-cancel {
  background: var(--surface2); color: var(--muted2);
  border: 1px solid var(--border2); padding: 12px 20px;
  border-radius: 6px; font-family: 'Space Mono', monospace;
  font-size: 0.8rem; cursor: pointer;
}
.mobile-presets {
  display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px;
}
.mobile-preset-btn {
  background: transparent; border: 1px solid var(--border2);
  color: var(--muted2); padding: 6px 14px;
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  cursor: pointer; border-radius: 3px; transition: all 0.2s;
}
.mobile-preset-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">STOCK_WATCH</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="tickerInput" placeholder="티커 입력 (AAPL, 005930.KS…)" />
      <button class="add-btn" onclick="addTicker()">+ 추가</button>
    </div>
    <div class="sidebar-section-label">빠른 추가</div>
    <div class="preset-list">
      <button class="preset-btn" onclick="addPreset('AAPL')">AAPL</button>
      <button class="preset-btn" onclick="addPreset('NVDA')">NVDA</button>
      <button class="preset-btn" onclick="addPreset('TSLA')">TSLA</button>
      <button class="preset-btn" onclick="addPreset('MSFT')">MSFT</button>
      <button class="preset-btn" onclick="addPreset('GOOGL')">GOOGL</button>
      <button class="preset-btn" onclick="addPreset('META')">META</button>
      <button class="preset-btn" onclick="addPreset('005930.KS')">삼성</button>
      <button class="preset-btn" onclick="addPreset('000660.KS')">SK하이닉스</button>
      <button class="preset-btn" onclick="addPreset('BTC-USD')">BTC</button>
      <button class="preset-btn" onclick="addPreset('^GSPC')">S&P500</button>
    </div>
    <div class="sidebar-section-label">watchlist</div>
    <div class="watchlist" id="watchlist">
      <div style="padding:20px 16px;font-size:0.72rem;color:var(--muted);font-family:'Space Mono',monospace;">종목을 추가해보세요</div>
    </div>
    <div class="sidebar-footer">
      <span>Yahoo Finance</span>
      <span>갱신: <span id="countdownTimer">10s</span></span>
    </div>
  </aside>

  <main class="main" id="mainArea">
    <div class="main-empty">
      <div class="em-icon">📈</div>
      <div>좌측에서 종목을 추가하거나</div>
      <div>클릭하면 상세 분석을 볼 수 있습니다</div>
    </div>
  </main>
</div>
<div class="status-toast" id="statusToast"></div>

<script>
const watchlist = new Set();
const stockData = {};
const historyData = {};
let activeTicker = null;
let priceChart = null;
let currentRange = '1mo';
let currentChartType = 'line';

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock,1000); updateClock();

let toastTimer;
function showToast(msg,type='') {
  const el=document.getElementById('statusToast');
  el.className='status-toast '+type;
  el.innerHTML=type==='loading'?`<span class="spinner"></span>${msg}`:msg;
  el.style.display='block';
  clearTimeout(toastTimer);
  if(type!=='loading') toastTimer=setTimeout(()=>el.style.display='none',2500);
}
function hideToast(){document.getElementById('statusToast').style.display='none';}

async function proxyFetch(url) {
  const proxies = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  ];

  for (const makeProxy of proxies) {
    try {
      const proxyUrl = makeProxy(url);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;

      // allorigins wraps in {contents}, others return raw
      const text = await res.text();
      let parsed;
      try {
        const wrapper = JSON.parse(text);
        // allorigins style
        if (wrapper.contents) {
          parsed = JSON.parse(wrapper.contents);
        } else {
          parsed = wrapper;
        }
      } catch {
        parsed = JSON.parse(text);
      }
      return parsed;
    } catch (e) {
      console.warn('Proxy failed, trying next...', e.message);
    }
  }
  throw new Error('모든 프록시 서버 연결 실패. 잠시 후 다시 시도해주세요.');
}

async function fetchStock(ticker) {
  const json=await proxyFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=2d`);
  const result=json.chart?.result;
  if(!result?.length) throw new Error('no data');
  const meta=result[0].meta;
  const isClosed=meta.marketState==='CLOSED';
  return {
    ticker:meta.symbol, name:meta.shortName||meta.symbol,
    price:isClosed?(meta.regularMarketPreviousClose||meta.regularMarketPrice):meta.regularMarketPrice,
    prevClose:meta.chartPreviousClose||meta.previousClose,
    open:meta.regularMarketOpen, high:meta.regularMarketDayHigh,
    low:meta.regularMarketDayLow, volume:meta.regularMarketVolume,
    currency:meta.currency, marketState:meta.marketState, isClosed,
  };
}

async function fetchHistory(ticker,range='1mo') {
  const imap={'1mo':'1d','3mo':'1d','6mo':'1d','1y':'1wk','2y':'1wk','5y':'1mo'};
  const json=await proxyFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${imap[range]||'1d'}&range=${range}`);
  const result=json.chart?.result;
  if(!result?.length) throw new Error('no history');
  const ts=result[0].timestamp||[];
  const q=result[0].indicators?.quote?.[0]||{};
  return ts.map((t,i)=>({
    date:new Date(t*1000),open:q.open?.[i],high:q.high?.[i],
    low:q.low?.[i],close:q.close?.[i],volume:q.volume?.[i]
  })).filter(d=>d.close!=null);
}

async function fetchNews(ticker) {
  // Try Yahoo Finance search first, fallback to RSS feeds
  const results = [];
  try {
    const json=await proxyFetch(`https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(ticker)}&newsCount=8&quotesCount=0`);
    if(json.news&&json.news.length) return json.news;
  } catch {}
  return results;
}

async function fetchMarketNews() {
  // Fetch general market news from multiple RSS sources via allorigins
  const sources = [
    { name:'Reuters', url:'https://feeds.reuters.com/reuters/businessNews' },
    { name:'Yahoo Finance', url:'https://finance.yahoo.com/news/rssindex' },
    { name:'Investing.com', url:'https://www.investing.com/rss/news.rss' },
  ];
  const items = [];
  for(const src of sources) {
    try {
      let xmlText = null;
      const proxyUrls = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(src.url)}`,
        `https://corsproxy.io/?${encodeURIComponent(src.url)}`,
      ];
      for (const pu of proxyUrls) {
        try {
          const res = await fetch(pu, { signal: AbortSignal.timeout(6000) });
          if (!res.ok) continue;
          const text = await res.text();
          try {
            const w = JSON.parse(text);
            xmlText = w.contents || text;
          } catch { xmlText = text; }
          break;
        } catch {}
      }
      if (!xmlText) continue;
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, 'text/xml');
      const entries = xml.querySelectorAll('item');
      entries.forEach((el,i) => {
        if(i>=3) return;
        const title = el.querySelector('title')?.textContent||'';
        const link  = el.querySelector('link')?.textContent||el.querySelector('link')?.nextSibling?.textContent||'#';
        const pubDate = el.querySelector('pubDate')?.textContent||'';
        const desc = el.querySelector('description')?.textContent||'';
        items.push({ title, link, pubDate, desc, source: src.name });
      });
    } catch {}
  }
  return items;
}

function calcSMA(d,p){if(d.length<p)return null;return d.slice(-p).reduce((a,b)=>a+b,0)/p;}
function calcEMA(d,p){if(d.length<p)return null;const k=2/(p+1);let e=d.slice(0,p).reduce((a,b)=>a+b,0)/p;for(let i=p;i<d.length;i++)e=d[i]*k+e*(1-k);return e;}
function calcRSI(c,p=14){if(c.length<p+1)return null;let g=0,l=0;for(let i=c.length-p;i<c.length;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l+=Math.abs(d);}const ag=g/p,al=l/p;if(al===0)return 100;return 100-(100/(1+ag/al));}
function calcBoll(c,p=20){if(c.length<p)return null;const s=c.slice(-p);const m=s.reduce((a,b)=>a+b,0)/p;const std=Math.sqrt(s.reduce((a,b)=>a+(b-m)**2,0)/p);return{upper:m+2*std,middle:m,lower:m-2*std};}
function getIndicators(hist){const c=hist.map(d=>d.close);return{rsi:calcRSI(c),sma20:calcSMA(c,20),sma50:calcSMA(c,50),ema12:calcEMA(c,12),ema26:calcEMA(c,26),boll:calcBoll(c),last:c[c.length-1],closes:c,hist};}

function fmt(n,dec=2){if(n==null||isNaN(n))return'--';if(Math.abs(n)>=1e12)return(n/1e12).toFixed(2)+'T';if(Math.abs(n)>=1e9)return(n/1e9).toFixed(2)+'B';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';return n.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function cs(c){return c==='KRW'?'₩':c==='USD'?'$':'';}

let chartLoadToken = 0; // cancel stale chart loads

async function loadChart(ticker,range) {
  const myToken = ++chartLoadToken;
  const loading=document.getElementById('chartLoading');
  if(loading){ loading.style.display='flex'; loading.innerHTML='<span class="spinner"></span>차트 로딩 중...'; }
  // destroy old chart immediately so canvas is free
  if(priceChart){ priceChart.destroy(); priceChart=null; }
  try {
    const hist=await fetchHistory(ticker,range);
    if(myToken !== chartLoadToken) return; // stale, newer load started
    historyData[ticker]=hist;
    drawChart(hist);
    if(loading)loading.style.display='none';
    renderTechnical(ticker,hist);
  } catch(e) {
    if(myToken !== chartLoadToken) return;
    if(loading){ loading.style.display='flex'; loading.innerHTML='차트 데이터 오류: '+e.message; }
  }
}

function drawChart(hist) {
  const canvas=document.getElementById('priceChart');
  if(!canvas)return;
  if(priceChart){priceChart.destroy();priceChart=null;}
  const labels=hist.map(d=>d.date.toLocaleDateString('ko-KR',{month:'short',day:'numeric'}));
  const closes=hist.map(d=>d.close);
  const isUp=closes[closes.length-1]>=closes[0];
  const color=isUp?'#00e676':'#ff4060';
  const ctx=canvas.getContext('2d');
  const opts={
    responsive:true,maintainAspectRatio:false,
    interaction:{intersect:false,mode:'index'},
    plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:'#14141f',borderColor:'#252540',borderWidth:1,titleColor:'#6a6a90',bodyColor:'#dde0f0',titleFont:{family:'Space Mono',size:10},bodyFont:{family:'Space Mono',size:11},callbacks:{label:c=>' '+c.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}}
    },
    scales:{
      x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#4a4a70',font:{family:'Space Mono',size:9},maxTicksLimit:8},border:{color:'#1c1c2e'}},
      y:{position:'right',grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#4a4a70',font:{family:'Space Mono',size:9},callback:v=>v.toLocaleString('en-US',{maximumFractionDigits:0})},border:{color:'#1c1c2e'}}
    }
  };
  if(currentChartType==='bar'){
    priceChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'종가',data:closes,backgroundColor:hist.map((d,i)=>i===0?color:(closes[i]>=closes[i-1]?'rgba(0,230,118,0.7)':'rgba(255,64,96,0.7)')),borderRadius:2}]},options:opts});
  } else {
    const grad=ctx.createLinearGradient(0,0,0,280);
    grad.addColorStop(0,isUp?'rgba(0,230,118,0.18)':'rgba(255,64,96,0.18)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    priceChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'종가',data:closes,borderColor:color,borderWidth:1.5,backgroundColor:grad,fill:true,pointRadius:0,pointHoverRadius:4,tension:0.3}]},options:opts});
  }
}

function renderNewsItem(title, link, timeStr, source) {
  const neg=['하락','급락','위기','손실','우려','경고','약세','sell','decline','fall','drop','risk','fear','warn'];
  const pos=['상승','급등','호재','성장','강세','buy','돌파','신고가','수익','rise','surge','gain','beat','record','strong'];
  const lc=(title||'').toLowerCase();
  const sent=pos.some(w=>lc.includes(w))?'pos':neg.some(w=>lc.includes(w))?'neg':'neu';
  return `<div class="news-item">

      <span class="news-source">${(source||'NEWS').toUpperCase().slice(0,20)}</span>
      <span class="news-time">${timeStr||''}</span>

    <div class="news-title"><a href="${link||'#'}" target="_blank" style="color:var(--text);text-decoration:none;">${title||''}</a></div>
  </div>`;
}

  const el=document.getElementById('newsList');
  if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted2);font-size:0.78rem;"><span class="spinner"></span> 뉴스 불러오는 중...</div>';

  const allItems = [];

  // 1) Ticker-specific news from Yahoo Finance
  try {
    const news=await fetchNews(ticker);
    news.slice(0,5).forEach(n=>{
      const ts=n.providerPublishTime?new Date(n.providerPublishTime*1000).toLocaleString('ko-KR'):'';
      allItems.push({ title:n.title||'', link:n.link||'#', time:ts, source:n.publisher||'Yahoo Finance' });
    });
  } catch {}

  // 2) Market-wide RSS news
  try {
    const rss = await fetchMarketNews();
    rss.forEach(r=>{
      const ts = r.pubDate ? new Date(r.pubDate).toLocaleString('ko-KR') : '';
      allItems.push({ title:r.title, link:r.link, time:ts, source:r.source });
    });
  } catch {}

  if(!allItems.length){
    el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted2);font-size:0.78rem;">뉴스를 불러올 수 없습니다.<br><span style="font-size:0.65rem;">Yahoo Finance 또는 RSS 소스에 접근할 수 없습니다.</span></div>';
    return;
  }

  // Section: ticker news
  let html = '';
  const tickerItems = allItems.filter(i=>i.source!=='Reuters'&&i.source!=='Yahoo Finance RSS'&&i.source!=='Investing.com');
  const marketItems = allItems.filter(i=>i.source==='Reuters'||i.source==='Yahoo Finance RSS'||i.source==='Investing.com');

  if(tickerItems.length){
    html += `<div style="font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:3px;color:var(--muted2);padding:4px 0 10px;text-transform:uppercase;">${ticker} 관련 뉴스</div>`;
    html += tickerItems.map(i=>renderNewsItem(i.title,i.link,i.time,i.source)).join('');
  }
  if(marketItems.length){
    html += `<div style="font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:3px;color:var(--muted2);padding:${tickerItems.length?'20px':'4px'} 0 10px;text-transform:uppercase;">글로벌 시장 뉴스</div>`;
    html += marketItems.map(i=>renderNewsItem(i.title,i.link,i.time,i.source)).join('');
  }

  el.innerHTML = html;
}

function runAIAnalysis(ticker) {
  const btn=document.getElementById('aiBtn');
  const content=document.getElementById('aiContent');
  if(!btn||!content)return;
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>분석 중...';
  content.className='ai-content';
  content.innerHTML='<span class="spinner"></span> 기술적 지표를 분석하고 있습니다...';

  setTimeout(()=>{
    const d=stockData[ticker];
    const hist=historyData[ticker]||[];
    if(!d||!hist.length){
      content.innerHTML='<span style="color:var(--down)">데이터가 부족합니다. 차트 탭을 먼저 로딩해주세요.</span>';
      btn.innerHTML='✦ 분석 시작'; btn.disabled=false; return;
    }
    const ind=getIndicators(hist);
    const macd=ind.ema12&&ind.ema26?ind.ema12-ind.ema26:null;
    const chg=((d.price-d.prevClose)/d.prevClose*100);
    const chgSign=chg>0?'+':'';
    const cSym=cs(d.currency);

    // ── 신호 점수 계산 (양수=강세, 음수=약세) ──
    let score=0, signals=[];

    // RSI
    if(ind.rsi!=null){
      if(ind.rsi<30){score+=2;signals.push({icon:'🟢',text:`RSI ${ind.rsi.toFixed(1)} — 과매도 구간으로 반등 가능성이 높습니다.`});}
      else if(ind.rsi<45){score+=1;signals.push({icon:'🟡',text:`RSI ${ind.rsi.toFixed(1)} — 약세권이나 바닥 탐색 중입니다.`});}
      else if(ind.rsi<55){score+=0;signals.push({icon:'⚪',text:`RSI ${ind.rsi.toFixed(1)} — 중립 구간으로 방향성을 확인 중입니다.`});}
      else if(ind.rsi<70){score+=1;signals.push({icon:'🟡',text:`RSI ${ind.rsi.toFixed(1)} — 강세권으로 상승 모멘텀이 유지되고 있습니다.`});}
      else{score-=2;signals.push({icon:'🔴',text:`RSI ${ind.rsi.toFixed(1)} — 과매수 구간으로 단기 조정 가능성이 있습니다.`});}
    }

    // SMA 크로스
    if(ind.sma20&&ind.sma50){
      if(ind.sma20>ind.sma50){score+=2;signals.push({icon:'🟢',text:`골든크로스 — 20일(${fmt(ind.sma20)}) > 50일(${fmt(ind.sma50)}) 이동평균으로 중기 상승추세입니다.`});}
      else{score-=2;signals.push({icon:'🔴',text:`데드크로스 — 20일(${fmt(ind.sma20)}) < 50일(${fmt(ind.sma50)}) 이동평균으로 중기 하락추세입니다.`});}
    }

    // 가격 vs MA20
    if(ind.sma20&&ind.last){
      const diff=(ind.last-ind.sma20)/ind.sma20*100;
      if(diff>0){score+=1;signals.push({icon:'🟢',text:`현재가가 20일 이동평균보다 ${diff.toFixed(1)}% 위에 위치해 단기 강세입니다.`});}
      else{score-=1;signals.push({icon:'🔴',text:`현재가가 20일 이동평균보다 ${Math.abs(diff).toFixed(1)}% 아래에 위치해 단기 약세입니다.`});}
    }

    // MACD
    if(macd!=null){
      if(macd>0){score+=1;signals.push({icon:'🟢',text:`MACD +${fmt(macd)} — 양수로 단기 강세 모멘텀이 형성되어 있습니다.`});}
      else{score-=1;signals.push({icon:'🔴',text:`MACD ${fmt(macd)} — 음수로 단기 약세 압력이 존재합니다.`});}
    }

    // 볼린저밴드
    if(ind.boll&&ind.last){
      const range=ind.boll.upper-ind.boll.lower;
      const pos=range>0?(ind.last-ind.boll.lower)/range*100:50;
      if(pos>85){score-=2;signals.push({icon:'🔴',text:`볼린저 상단(${fmt(ind.boll.upper)}) 근접 — 단기 과열, 되돌림 주의.`});}
      else if(pos<15){score+=2;signals.push({icon:'🟢',text:`볼린저 하단(${fmt(ind.boll.lower)}) 근접 — 과매도 반등 가능 구간입니다.`});}
      else{signals.push({icon:'⚪',text:`볼린저밴드 중간(${pos.toFixed(0)}%) — 정상 거래 범위 내에 위치합니다.`});}
    }

    // 거래량
    const vols=hist.slice(-10).map(d=>d.volume||0);
    const vr=vols.slice(5).reduce((a,b)=>a+b,0)/5,vp=vols.slice(0,5).reduce((a,b)=>a+b,0)/5;
    if(vp>0){
      const vDiff=(vr-vp)/vp*100;
      if(vDiff>20){score+=1;signals.push({icon:'🟢',text:`거래량 +${vDiff.toFixed(0)}% 증가 — 강한 매수세가 유입되고 있습니다.`});}
      else if(vDiff<-20){score-=1;signals.push({icon:'🔴',text:`거래량 ${vDiff.toFixed(0)}% 감소 — 거래 위축으로 추세 약화 가능성이 있습니다.`});}
      else{signals.push({icon:'⚪',text:`거래량 보통 수준 — 특별한 매수/매도 쏠림은 없습니다.`});}
    }

    // ── 종합 판단 ──
    let verdict, verdictClass, verdictDesc, shortTerm, midTerm, risk;
    const last=ind.last||d.price;
    const support=ind.boll?fmt(ind.boll.lower):ind.sma50?fmt(ind.sma50):'--';
    const resist=ind.boll?fmt(ind.boll.upper):ind.sma20?fmt((ind.sma20*1.05)):'--';

    if(score>=5){
      verdict='강한 매수'; verdictClass='bullish';
      verdictDesc='다수의 기술적 지표가 강한 매수 신호를 보내고 있습니다. 현재 구간은 매수 우위로 판단됩니다.';
      shortTerm=`단기적으로 강한 상승 모멘텀이 예상됩니다. 주요 저항선(${resist}) 돌파 여부를 주목하세요.`;
      midTerm='중장기적으로도 상승 추세가 이어질 가능성이 높습니다. 추세 추종 전략이 유효합니다.';
      risk='과매수 국면 진입 시 단기 조정 가능성이 있으며, 거래량이 줄어들면 모멘텀 약화에 주의하세요.';
    } else if(score>=2){
      verdict='매수'; verdictClass='bullish';
      verdictDesc='기술적 지표가 대체로 긍정적인 신호를 보이고 있습니다. 매수 우위 국면입니다.';
      shortTerm=`단기 상승 가능성이 있으나 저항선(${resist}) 근처에서 매도 압력에 주의하세요.`;
      midTerm='추세가 유지된다면 중기적으로 상승 가능성이 있습니다. 이동평균 지지 여부를 확인하세요.';
      risk=`지지선(${support}) 이탈 시 하락 전환 가능성이 있으니 손절 기준을 설정하세요.`;
    } else if(score>=-1){
      verdict='중립'; verdictClass='neutral';
      verdictDesc='현재 기술적 지표들이 혼조세를 보이고 있습니다. 방향성이 확인될 때까지 관망이 유리합니다.';
      shortTerm=`단기 방향성이 불분명합니다. 볼린저밴드(${support} ~ ${resist}) 돌파 방향을 확인 후 대응하세요.`;
      midTerm='이동평균 배열과 거래량 추이를 지속적으로 모니터링하세요. 방향성 확인 후 진입을 고려하세요.';
      risk='횡보 구간에서 잘못된 신호(페이크 아웃)에 주의하고, 거래량을 반드시 확인하세요.';
    } else if(score>=-4){
      verdict='매도'; verdictClass='bearish';
      verdictDesc='기술적 지표가 약세 신호를 보이고 있습니다. 매도 또는 관망이 유리한 구간입니다.';
      shortTerm=`단기 하락 압력이 존재합니다. 지지선(${support}) 이탈 여부를 주시하세요.`;
      midTerm='중기적으로 하락 추세가 이어질 수 있습니다. 반등 시 매도 기회를 모색하는 전략이 유효합니다.';
      risk='추가 하락 시 손실 확대 가능성이 있으니 보유 중이라면 리스크 관리가 필요합니다.';
    } else {
      verdict='강한 매도'; verdictClass='bearish';
      verdictDesc='다수의 기술적 지표가 강한 매도 신호를 보내고 있습니다. 하락 추세가 뚜렷합니다.';
      shortTerm=`단기 강한 하락 압력이 예상됩니다. 지지선(${support}) 근처에서 반등 여부를 확인하세요.`;
      midTerm='중장기적으로도 약세 흐름이 지속될 가능성이 높습니다. 신규 매수는 추세 전환 확인 후 검토하세요.';
      risk='과매도 구간에서도 추가 하락이 발생할 수 있으니 반등 매수보다 관망을 우선하세요.';
    }

    const signalHTML=signals.map(s=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;"><span>${s.icon}</span><span>${s.text}</span></div>`).join('');

    content.className='ai-content fade-in';
    content.innerHTML=`
      <div class="ai-verdict"><span class="verdict-badge ${verdictClass}">${verdict}</span><span style="font-size:0.72rem;color:var(--muted2);margin-left:6px;">종합 스코어: ${score>0?'+':''}${score}점</span></div>
      <div style="margin-bottom:18px;line-height:1.7;">${verdictDesc}</div>

      <div style="font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--accent);letter-spacing:2px;margin-bottom:10px;">⚡ 기술적 신호</div>
      <div style="margin-bottom:18px;font-size:0.8rem;line-height:1.8;">${signalHTML}</div>

      <div style="font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--accent);letter-spacing:2px;margin-bottom:8px;">🎯 단기 전망 (1~4주)</div>
      <div style="margin-bottom:16px;font-size:0.8rem;line-height:1.7;">${shortTerm}</div>

      <div style="font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--accent);letter-spacing:2px;margin-bottom:8px;">📅 중장기 전망 (3~6개월)</div>
      <div style="margin-bottom:16px;font-size:0.8rem;line-height:1.7;">${midTerm}</div>

      <div style="font-family:'Space Mono',monospace;font-size:0.72rem;color:#ffd700;letter-spacing:2px;margin-bottom:8px;">⚠️ 리스크 요인</div>
      <div style="margin-bottom:16px;font-size:0.8rem;line-height:1.7;">${risk}</div>

      <div style="font-size:0.68rem;color:var(--muted);border-top:1px solid var(--border);padding-top:12px;">
        ※ 본 분석은 기술적 지표 기반 자동 생성 리포트이며, 투자 권유가 아닙니다. 투자 결정은 본인 판단으로 하시기 바랍니다.
      </div>`;
    btn.innerHTML='↺ 재분석'; btn.disabled=false;
  }, 600);
}

async function loadTickerData(ticker) {
  try { stockData[ticker]=await fetchStock(ticker); }
  catch { stockData[ticker]={ticker,name:ticker,price:NaN,prevClose:NaN,open:NaN,high:NaN,low:NaN,volume:NaN,currency:'USD',marketState:'CLOSED',isClosed:true}; }
}

async function addTicker() {
  const input=document.getElementById('tickerInput');
  const raw=input.value.trim().toUpperCase();
  if(!raw)return; input.value='';
  if(watchlist.has(raw)){showToast(raw+' 이미 추가됨','error');return;}
  watchlist.add(raw); renderWatchlist();
  showToast(raw+' 불러오는 중...','loading');
  await loadTickerData(raw); renderWatchlist(); hideToast();
  if(!activeTicker)selectTicker(raw);
}
async function addPreset(t) {
  if(watchlist.has(t)){selectTicker(t);return;}
  watchlist.add(t); renderWatchlist();
  await loadTickerData(t); renderWatchlist();
  if(!activeTicker)selectTicker(t);
}
function removeTicker(t) {
  watchlist.delete(t); delete stockData[t]; delete historyData[t];
  if(activeTicker===t){
    activeTicker=null;
    const next=[...watchlist][0];
    if(next)selectTicker(next);
    else document.getElementById('mainArea').innerHTML=`<div class="main-empty"><div class="em-icon">📈</div><div>좌측에서 종목을 추가해보세요</div></div>`;
  }
  renderWatchlist();
}
async function selectTicker(ticker) {
  activeTicker=ticker; renderWatchlist();
  if(!stockData[ticker]||isNaN(stockData[ticker].price)){
    showToast(ticker+' 로딩...','loading');
    await loadTickerData(ticker); hideToast();
  }
  await renderMain(ticker);
}

let countdown=10;
function tickCountdown(){
  countdown--;
  const el=document.getElementById('countdownTimer');
  if(el)el.textContent=countdown+'s';
  if(countdown<=0){countdown=10;refreshAll();}
}
setInterval(tickCountdown,1000);

async function refreshAll(){
  if(!watchlist.size)return;
  await Promise.all([...watchlist].map(loadTickerData));
  renderWatchlist();
  if(activeTicker&&stockData[activeTicker]){
    const d=stockData[activeTicker];
    const chg=d.price-d.prevClose,pct=chg/d.prevClose*100;
    const dir=chg>0.005?'up':chg<-0.005?'down':'flat';
    const sign=chg>0?'+':'';
    const bp=document.querySelector('.big-price');
    const bc=document.querySelector('.big-change');
    if(bp)bp.textContent=cs(d.currency)+fmt(d.price);
    if(bc){bc.className='big-change '+dir;bc.textContent=`${sign}${fmt(chg)} (${sign}${fmt(pct)}%)`;}
  }
}

document.getElementById('tickerInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTicker();});
</script>

async function mobileAddTicker() {
